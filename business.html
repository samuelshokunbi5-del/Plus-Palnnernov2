<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planner Tools - Pulse Planner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="container py-5">

<h1>Student Planner Setup</h1>

<p class="lead">
Create a custom study and homework schedule.
</p>

<form class="mt-4">

<div class="mb-3">
<label for="studentName" class="form-label">Student Name</label>
<input type="text" id="studentName" class="form-control" required>
</div>

<div class="mb-3">
<label for="grade" class="form-label">Grade Level</label>
<select id="grade" class="form-select">
<option>9th Grade</option>
<option>10th Grade</option>
<option>11th Grade</option>
<option>12th Grade</option>
</select>
</div>

<div class="mb-3">
<label for="subjects" class="form-label">Subjects</label>
<textarea id="subjects" class="form-control"></textarea>
</div>

<button class="btn btn-primary">
Create Planner
</button>

</form>

<div class="mt-5">

<h3>Hours</h3>
<p>Monday - Friday: 8AM - 8PM</p>

<h3>Pricing</h3>
<p>Plans start at $5/month</p>

</div>

</section>

<footer>
<p>© 2026 Pulse Planner</p>
</footer>

</body>
</html>
